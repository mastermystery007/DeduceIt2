name: Android CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"
      - name: Unit tests
        shell: bash
        run: |
          set -o pipefail
          gradle testDebugUnitTest --stacktrace 2>&1 | tee unit-test.log
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: unit-test.log
      - name: Debug build
        run: gradle assembleDebug --stacktrace
